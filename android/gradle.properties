org.gradle.jvmargs=-Xmx1500m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
# Désactive le VFS watch de Gradle (corrige les erreurs metadata.bin sur Windows)
org.gradle.vfs.watch=false
# Force un seul worker pour éviter la race condition sur instrumentation-hierarchy.bin (bug Gradle Windows)
org.gradle.parallel=false
org.gradle.workers.max=1
# Garde le daemon actif (daemon=false empêche l'écriture correcte des metadata.bin)
org.gradle.daemon=true
