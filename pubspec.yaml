name: festcompanion  # Nom de ton appli (sans espaces, en snake_case)
description: All you need in one place for your summer festivals!

# Version de l'appli (format : major.minor.patch)
version: 1.7.0+27

environment:
  sdk: '^3.11.0'  # Version du SDK Dart compatible

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2  # ✅ Pour sauvegarder les données localement
  font_awesome_flutter: ^11.0.0  # Pour les icônes des réseaux sociaux
  url_launcher: ^6.1.11         # Pour ouvrir les liens externes
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2  # Push notifications FCM
  firebase_storage: ^13.4.1
  firebase_auth: ^6.5.1 # Si tu veux lier les photos à un user
  image_picker: ^1.0.4 # Pour sélectionner des images depuis le téléphone
  geolocator: ^14.0.2
  cached_network_image: ^3.3.0
  clipboard: ^3.0.14  # ✅ Pour copier le numéro dans le presse-papier
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^18.0.0  # Affichage notifications locales (foreground)
  timezone: ^0.10.0  # Planification de notifications locales à l'heure du festival
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  # Pour les bonnes pratiques de code
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true  # Active les widgets Material Design
  assets:
    - .env
    - lib/assets/
    - lib/assets/backgrounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/icon.png"
  adaptive_icon_background: "lib/assets/icon/icon_background.png"
  adaptive_icon_foreground: "lib/assets/icon/icon_foreground.png"
  remove_alpha_ios: true